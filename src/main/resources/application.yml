spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

jwt:
  secret-key: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

server:
  port: ${PORT:8080}

logging:
  level:
    org.springframework.security: DEBUG

